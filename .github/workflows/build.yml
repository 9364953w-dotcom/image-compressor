name: Build Executables

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 Pillow pyinstaller
    
    - name: Build macOS App
      run: |
        pyinstaller \
          --name="ImageCompressor" \
          --windowed \
          --icon=icon.icns \
          --add-data "src/resources:src/resources" \
          --clean \
          --noconfirm \
          src/__main__.py
    
    - name: Rename App
      run: |
        mv "dist/ImageCompressor.app" "dist/图片压缩工具.app"
    
    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-app
        path: dist/图片压缩工具.app
        retention-days: 30

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 Pillow pyinstaller
    
    - name: Build Windows EXE
      run: |
        pyinstaller `
          --name="ImageCompressor" `
          --windowed `
          --icon=icon.png `
          --add-data "src/resources;src/resources" `
          --clean `
          --noconfirm `
          src/__main__.py
    
    - name: Rename EXE folder
      run: |
        Rename-Item -Path "dist/ImageCompressor" -NewName "图片压缩工具"
    
    - name: Create ZIP
      run: |
        Compress-Archive -Path "dist/图片压缩工具" -DestinationPath "dist/图片压缩工具-Windows.zip"
    
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-exe
        path: dist/图片压缩工具-Windows.zip
        retention-days: 30

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - name: Download macOS Artifact
      uses: actions/download-artifact@v4
      with:
        name: macos-app
        path: ./macos
    
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: windows-exe
        path: ./windows
    
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./windows/图片压缩工具-Windows.zip
        fail_on_unmatched_paths: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
