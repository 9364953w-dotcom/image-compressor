name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 Pillow pyinstaller
    
    - name: Build macOS App
      run: |
        pyinstaller \
          --name="ImageCompressor" \
          --windowed \
          --icon=icon.icns \
          --add-data "src/resources:src/resources" \
          --clean \
          --noconfirm \
          src/__main__.py
    
    - name: Create ZIP
      run: |
        cd dist
        zip -r "ImageCompressor-macOS.zip" "ImageCompressor.app"
    
    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-build
        path: dist/ImageCompressor-macOS.zip

  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt5 Pillow pyinstaller
    
    - name: Build Windows EXE
      run: |
        pyinstaller `
          --name="ImageCompressor" `
          --windowed `
          --icon=icon.png `
          --add-data "src/resources;src/resources" `
          --clean `
          --noconfirm `
          src/__main__.py
    
    - name: Create ZIP
      run: |
        cd dist
        Rename-Item -Path "ImageCompressor" -NewName "图片压缩工具"
        Compress-Archive -Path "图片压缩工具" -DestinationPath "ImageCompressor-Windows.zip"
    
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: dist/ImageCompressor-Windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Download macOS Artifact
      uses: actions/download-artifact@v4
      with:
        name: macos-build
    
    - name: Download Windows Artifact
      uses: actions/download-artifact@v4
      with:
        name: windows-build
    
    - name: List files
      run: ls -la
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ImageCompressor-macOS.zip
          ImageCompressor-Windows.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
